<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Training Muallimahs Class Attendance</title>

<style>
    /* --- EXACT RESET & PRINT LAYOUT --- */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        margin: 0;
        background: #f0f2f5;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 10px;
        min-height: 100vh;
    }

    /* --- A4 PAGE CONTAINER (identical width) --- */
    .page {
        width: 595px;
        min-height: 842px;
        margin: 0 auto;
        padding-top: 48px;
        background: white;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        position: relative;
    }

    /* --- TITLE (exact match) --- */
    .title {
        width: 420px;
        margin: 0 auto 12px auto;
        border: 1px solid #555;
        text-align: center;
        font-size: 14px;
        font-weight: bold;
        letter-spacing: .5px;
        height: 20px;
        line-height: 20px;
        background: #fafafa;
    }

    /* --- TABLE BOX (exact dimensions) --- */
    .box {
        width: 420px;
        margin: 0 auto 42px auto;
        border-collapse: collapse;
        font-size: 11px;
        font-weight: bold;
    }

    /* second table has less bottom margin */
    .box.second {
        margin-bottom: 0;
    }

    /* --- ALL CELLS share border + height --- */
    .box td {
        border: 1px solid #777;
        height: 17px;
        padding: 0 3px;
        vertical-align: middle;
    }

    /* --- INFO rows (first 3 rows) --- */
    .info td {
        height: 17px;
        font-weight: bold;
        font-size: 11px;
    }

    /* --- HEADER row (DATE, CLASS, etc.) --- */
    .header td {
        height: 18px;
        text-align: center;
        font-size: 11px;
        font-weight: bold;
        background: #f1f3f5;
        padding: 0 2px;
    }

    /* --- ATTENDANCE rows (data rows) --- */
    .attendance td {
        height: 16px;
        font-weight: normal;
        padding: 0 2px;
    }

    /* --- INPUTS inside cells – invisible, fill cell --- */
    .attendance input,
    .info input {
        width: 100%;
        border: none;
        background: transparent;
        font-size: 10px;
        font-family: Arial, sans-serif;
        padding: 1px 0;
        margin: 0;
        outline: none;
        height: 100%;
        box-sizing: border-box;
        color: #111;
        font-weight: normal;
    }

    .info input {
        font-weight: bold;
        font-size: 11px;
    }

    .attendance input:focus,
    .info input:focus {
        background: #f0f5ff;
        border-radius: 1px;
    }

    /* --- COLUMN WIDTHS (exact match) --- */
    .date {
        width: 70px;
        text-align: center;
    }
    .class {
        width: 45px;
        text-align: center;
        font-weight: normal;
    }
    .batch {
        width: 60px;
    }
    .muallimah {
        width: 140px;
    }
    .time {
        width: 100px;
    }

    /* --- CLASS number styling --- */
    .class-number {
        font-weight: bold;
        font-size: 11px;
        display: block;
        text-align: center;
    }

    /* --- BUTTONS --- */
    .button-bar {
        margin-top: 20px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        padding: 16px 20px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        max-width: 595px;
        width: 100%;
    }

    .btn {
        background: white;
        border: 1.5px solid #1e1e1e;
        padding: 10px 28px;
        font-weight: 600;
        font-size: 14px;
        border-radius: 60px;
        cursor: pointer;
        color: #1e1e1e;
        transition: 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        letter-spacing: 0.2px;
        background: #fcfcfc;
        flex: 1 0 auto;
        justify-content: center;
        min-width: 110px;
    }

    .btn:hover {
        background: #1e1e1e;
        color: white;
        border-color: #1e1e1e;
        transform: scale(1.02);
    }

    .btn-clear:hover {
        background: #b22222;
        border-color: #b22222;
        color: white;
    }

    .btn-pdf:hover {
        background: #0b5e7c;
        border-color: #0b5e7c;
        color: white;
    }

    .btn-print:hover {
        background: #2a5c3e;
        border-color: #2a5c3e;
        color: white;
    }

    /* --- PRINT STYLES – remove buttons, keep exact design --- */
    @media print {
        body {
            background: white;
            padding: 0;
            margin: 0;
            display: block;
            min-height: auto;
        }
        .page {
            box-shadow: none;
            padding-top: 0.4in;
            width: 100%;
            min-height: 100%;
            margin: 0 auto;
        }
        .box {
            margin: 0 auto 42px auto;
        }
        .box.second {
            margin-bottom: 0;
        }
        .attendance input,
        .info input {
            border: none;
            background: transparent;
        }
        .attendance input:focus,
        .info input:focus {
            background: transparent;
        }
        .header td {
            background: #f1f3f5 !important;
        }
        .title {
            background: #fafafa;
        }
        .button-bar {
            display: none !important;
        }
        /* Ensure page breaks properly */
        .page {
            page-break-after: avoid;
        }
    }

    /* --- RESPONSIVE – keep it tight on small screens --- */
    @media (max-width: 620px) {
        body { padding: 10px 4px; }
        .page {
            width: 100%;
            min-height: auto;
            padding-top: 20px;
        }
        .title,
        .box {
            width: 100%;
            max-width: 420px;
        }
        .box {
            margin-left: auto;
            margin-right: auto;
        }
        .box.second {
            margin-bottom: 0;
        }
        .date { width: 14%; }
        .class { width: 10%; }
        .batch { width: 14%; }
        .muallimah { width: 32%; }
        .time { width: 24%; }
        .attendance td,
        .info td,
        .header td {
            padding: 0 2px;
            font-size: 9px;
        }
        .attendance input,
        .info input {
            font-size: 9px;
        }
        .title {
            font-size: 12px;
            height: 18px;
            line-height: 18px;
        }
        .button-bar {
            max-width: 100%;
            padding: 12px 14px;
        }
        .btn {
            padding: 8px 16px;
            font-size: 12px;
            min-width: 80px;
        }
    }

    @media (max-width: 400px) {
        .attendance td,
        .info td,
        .header td {
            font-size: 8px;
            padding: 0 1px;
        }
        .attendance input,
        .info input {
            font-size: 8px;
        }
        .title {
            font-size: 10px;
            height: 16px;
            line-height: 16px;
        }
        .class-number {
            font-size: 9px;
        }
        .box td {
            height: 14px;
        }
        .header td {
            height: 15px;
        }
        .attendance td {
            height: 14px;
        }
        .info td {
            height: 14px;
        }
        .btn {
            padding: 6px 12px;
            font-size: 11px;
            min-width: 60px;
        }
        .button-bar {
            gap: 8px;
            padding: 10px 10px;
        }
    }
</style>
</head>
<body>

<div class="page">

    <!-- ===== TITLE ===== -->
    <div class="title">
        TRAINING MUALLIMAHS CLASS ATTENDANCE
    </div>

    <!-- ===== FIRST TABLE ===== -->
    <table class="box">
        <tr class="info">
            <td colspan="5">
                • MUALLIMAH NAME:
                <input type="text" class="muallimahName" placeholder="" style="width:auto; display:inline-block; max-width:200px;">
            </td>
        </tr>
        <tr class="info">
            <td colspan="5">
                • CLASS TYPE:
                <input type="text" class="classType" placeholder="" style="width:auto; display:inline-block; max-width:200px;">
            </td>
        </tr>
        <tr class="info">
            <td colspan="5">
                • STARTING DATE:
                <input type="date" class="startingDate" style="width:auto; display:inline-block; max-width:150px;">
            </td>
        </tr>

        <tr class="header">
            <td class="date">DATE</td>
            <td class="class">CLASS</td>
            <td class="batch">BATCH</td>
            <td class="muallimah">CLASS MUALLIMAH</td>
            <td class="time">ATTEND TIME</td>
        </tr>

        <!-- 12 rows generated by JS -->
        <tbody class="tableBody1"></tbody>
    </table>

    <!-- ===== SECOND TABLE ===== -->
    <table class="box second">
        <tr class="info">
            <td colspan="5">
                • TRAINING MUALLIMAH NAME:
                <input type="text" class="muallimahName2" placeholder="" style="width:auto; display:inline-block; max-width:200px;">
            </td>
        </tr>
        <tr class="info">
            <td colspan="5">
                • CLASS TYPE:
                <input type="text" class="classType2" placeholder="" style="width:auto; display:inline-block; max-width:200px;">
            </td>
        </tr>
        <tr class="info">
            <td colspan="5">
                • STARTING DATE:
                <input type="date" class="startingDate2" style="width:auto; display:inline-block; max-width:150px;">
            </td>
        </tr>

        <tr class="header">
            <td class="date">DATE</td>
            <td class="class">CLASS</td>
            <td class="batch">BATCH</td>
            <td class="muallimah">CLASS MUALLIMAH</td>
            <td class="time">ATTEND TIME</td>
        </tr>

        <!-- 12 rows generated by JS -->
        <tbody class="tableBody2"></tbody>
    </table>

</div>

<!-- ===== BUTTONS ===== -->
<div class="button-bar">
    <button class="btn btn-print" id="printBtn">🖨️ Print</button>
    <button class="btn btn-pdf" id="pdfBtn">📄 Download PDF</button>
    <button class="btn btn-clear" id="clearBtn">🗑️ Clear All</button>
</div>

<!-- html2pdf library for PDF download -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>
    (function() {
        "use strict";

        // --------------------------------------------------------------
        // BUILD ROWS for a given tbody
        // --------------------------------------------------------------
        function buildRows(tbody) {
            tbody.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const tr = document.createElement('tr');
                tr.className = 'attendance';

                // DATE cell
                const tdDate = document.createElement('td');
                tdDate.className = 'date';
                const dateInput = document.createElement('input');
                dateInput.type = 'date';
                dateInput.className = 'input-date';
                tdDate.appendChild(dateInput);

                // CLASS cell
                const tdClass = document.createElement('td');
                tdClass.className = 'class';
                const span = document.createElement('span');
                span.className = 'class-number';
                span.textContent = i;
                tdClass.appendChild(span);

                // BATCH cell
                const tdBatch = document.createElement('td');
                tdBatch.className = 'batch';
                const batchInput = document.createElement('input');
                batchInput.type = 'text';
                batchInput.className = 'input-batch';
                batchInput.placeholder = '';
                tdBatch.appendChild(batchInput);

                // MUALLIMAH cell
                const tdMuallimah = document.createElement('td');
                tdMuallimah.className = 'muallimah';
                const muallimahInput = document.createElement('input');
                muallimahInput.type = 'text';
                muallimahInput.className = 'input-muallimah';
                muallimahInput.placeholder = '';
                tdMuallimah.appendChild(muallimahInput);

                // TIME cell
                const tdTime = document.createElement('td');
                tdTime.className = 'time';
                const timeInput = document.createElement('input');
                timeInput.type = 'time';
                timeInput.className = 'input-time';
                tdTime.appendChild(timeInput);

                tr.appendChild(tdDate);
                tr.appendChild(tdClass);
                tr.appendChild(tdBatch);
                tr.appendChild(tdMuallimah);
                tr.appendChild(tdTime);

                tbody.appendChild(tr);
            }
        }

        // --------------------------------------------------------------
        // INIT both tables
        // --------------------------------------------------------------
        const tbody1 = document.querySelector('.tableBody1');
        const tbody2 = document.querySelector('.tableBody2');
        buildRows(tbody1);
        buildRows(tbody2);

        // --------------------------------------------------------------
        // DEFAULT DATES
        // --------------------------------------------------------------
        function setDefaultDate(input) {
            if (!input) return;
            if (input.value) return;
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            input.value = `${yyyy}-${mm}-${dd}`;
        }

        const date1 = document.querySelector('.startingDate');
        const date2 = document.querySelector('.startingDate2');
        setDefaultDate(date1);
        setDefaultDate(date2);

        // --------------------------------------------------------------
        // LOCALSTORAGE – SAVE / LOAD (both tables)
        // --------------------------------------------------------------
        const STORAGE_KEY_1 = 'attendance_table1_data';
        const STORAGE_KEY_2 = 'attendance_table2_data';

        function getTableData(tableNum) {
            const nameInput = document.querySelector('.muallimahName' + (tableNum === 1 ? '' : '2'));
            const classInput = document.querySelector('.classType' + (tableNum === 1 ? '' : '2'));
            const dateInput = document.querySelector('.startingDate' + (tableNum === 1 ? '' : '2'));

            const tbody = tableNum === 1 ? tbody1 : tbody2;
            const rows = tbody.querySelectorAll('tr');
            const attendance = [];

            rows.forEach((tr, idx) => {
                const dateInp = tr.querySelector('.input-date');
                const batchInp = tr.querySelector('.input-batch');
                const muallimahInp = tr.querySelector('.input-muallimah');
                const timeInp = tr.querySelector('.input-time');

                attendance.push({
                    class: idx + 1,
                    date: dateInp ? dateInp.value : '',
                    batch: batchInp ? batchInp.value : '',
                    muallimah: muallimahInp ? muallimahInp.value : '',
                    attendTime: timeInp ? timeInp.value : ''
                });
            });

            return {
                name: nameInput ? nameInput.value : '',
                classType: classInput ? classInput.value : '',
                startingDate: dateInput ? dateInput.value : '',
                attendance: attendance
            };
        }

        function setTableData(tableNum, data) {
            if (!data) return;
            const nameInput = document.querySelector('.muallimahName' + (tableNum === 1 ? '' : '2'));
            const classInput = document.querySelector('.classType' + (tableNum === 1 ? '' : '2'));
            const dateInput = document.querySelector('.startingDate' + (tableNum === 1 ? '' : '2'));

            if (nameInput && data.name) nameInput.value = data.name;
            if (classInput && data.classType) classInput.value = data.classType;
            if (dateInput && data.startingDate) dateInput.value = data.startingDate;

            if (Array.isArray(data.attendance) && data.attendance.length === 12) {
                const tbody = tableNum === 1 ? tbody1 : tbody2;
                const rows = tbody.querySelectorAll('tr');
                rows.forEach((tr, idx) => {
                    const rowData = data.attendance[idx] || {};
                    const dateInp = tr.querySelector('.input-date');
                    const batchInp = tr.querySelector('.input-batch');
                    const muallimahInp = tr.querySelector('.input-muallimah');
                    const timeInp = tr.querySelector('.input-time');

                    if (dateInp) dateInp.value = rowData.date || '';
                    if (batchInp) batchInp.value = rowData.batch || '';
                    if (muallimahInp) muallimahInp.value = rowData.muallimah || '';
                    if (timeInp) timeInp.value = rowData.attendTime || '';
                });
            }
        }

        function saveAll() {
            const data1 = getTableData(1);
            const data2 = getTableData(2);
            localStorage.setItem(STORAGE_KEY_1, JSON.stringify(data1));
            localStorage.setItem(STORAGE_KEY_2, JSON.stringify(data2));
        }

        function loadAll() {
            try {
                const raw1 = localStorage.getItem(STORAGE_KEY_1);
                const raw2 = localStorage.getItem(STORAGE_KEY_2);
                if (raw1) setTableData(1, JSON.parse(raw1));
                if (raw2) setTableData(2, JSON.parse(raw2));
            } catch (_) {}
        }

        // --------------------------------------------------------------
        // AUTO-SAVE on any input change
        // --------------------------------------------------------------
        function attachAutoSave() {
            document.querySelectorAll('input').forEach(el => {
                el.addEventListener('input', saveAll);
                el.addEventListener('change', saveAll);
            });
        }

        // --------------------------------------------------------------
        // CLEAR ALL (with password 123)
        // --------------------------------------------------------------
        function clearAll() {
            if (!confirm('⚠️ Clear ALL attendance data from BOTH tables?')) return;
            const pwd = prompt('Enter password to clear data:');
            if (pwd !== '123') {
                alert('❌ Wrong Password');
                return;
            }

            localStorage.removeItem(STORAGE_KEY_1);
            localStorage.removeItem(STORAGE_KEY_2);

            // Reset all inputs
            document.querySelectorAll('.muallimahName, .muallimahName2, .classType, .classType2').forEach(el => el.value = '');
            
            // Reset dates to today
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const dateStr = `${yyyy}-${mm}-${dd}`;
            document.querySelector('.startingDate').value = dateStr;
            document.querySelector('.startingDate2').value = dateStr;

            // Reset all table inputs
            document.querySelectorAll('.input-date, .input-batch, .input-muallimah, .input-time').forEach(el => {
                el.value = '';
            });

            saveAll();
            alert('✅ All data cleared.');
        }

        // --------------------------------------------------------------
        // PRINT
        // --------------------------------------------------------------
        function printSheet() {
            window.print();
        }

        // --------------------------------------------------------------
        // DOWNLOAD PDF
        // --------------------------------------------------------------
        function downloadPDF() {
            const element = document.querySelector('.page');
            const dateVal = document.querySelector('.startingDate').value || 'no-date';
            const fileName = `Attendance_${dateVal}.pdf`;

            if (typeof html2pdf === 'undefined') {
                alert('html2pdf library not loaded. Please check internet connection.');
                return;
            }

            const opt = {
                margin:        [0.4, 0.3, 0.4, 0.3],
                filename:     fileName,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, letterRendering: true, useCORS: true },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            // Hide buttons temporarily
            const buttonBar = document.querySelector('.button-bar');
            if (buttonBar) buttonBar.style.display = 'none';

            html2pdf().set(opt).from(element).save().then(() => {
                if (buttonBar) buttonBar.style.display = 'flex';
            }).catch(() => {
                if (buttonBar) buttonBar.style.display = 'flex';
            });
        }

        // --------------------------------------------------------------
        // INIT
        // --------------------------------------------------------------
        loadAll();
        // Ensure dates are set if still empty after load
        if (!document.querySelector('.startingDate').value) setDefaultDate(document.querySelector('.startingDate'));
        if (!document.querySelector('.startingDate2').value) setDefaultDate(document.querySelector('.startingDate2'));
        attachAutoSave();

        // Button listeners
        document.getElementById('printBtn').addEventListener('click', printSheet);
        document.getElementById('pdfBtn').addEventListener('click', downloadPDF);
        document.getElementById('clearBtn').addEventListener('click', clearAll);

        window.addEventListener('beforeunload', saveAll);

        console.log('📋 Attendance form ready. Use the buttons below to Print, Download PDF, or Clear All data.');
    })();
</script>

</body>
</html>
